name: Deploy to Cloudflare

# Publishes the ProCon Worker + static site to Cloudflare on every push to main.
# Trigger: any commit pushed to `main` (e.g. adding a job photo). Can also be
# run by hand from the GitHub "Actions" tab via "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker + static assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 328f7727b1940a72f1ea48d6dd64803a
          command: deploy
